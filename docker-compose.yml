services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: nexio
      POSTGRES_PASSWORD: nexio
      POSTGRES_DB: nexio
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexio -d nexio"]
      interval: 2s
      timeout: 5s
      retries: 30
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build: .
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: postgres://nexio:nexio@db:5432/nexio
      PORT: "3100"
      SERVE_UI: "true"
      NEXIO_DEPLOYMENT_MODE: "authenticated"
      NEXIO_DEPLOYMENT_EXPOSURE: "private"
      NEXIO_PUBLIC_URL: "${NEXIO_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
    volumes:
      - nexio-data:/nexio
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  nexio-data:
